name: Deploy Cloudflare Worker API

on:
  push:
    paths:
      - 'api/**'          # Roda apenas se houver mudanças na pasta api/
    branches:
      - main              # Ajuste se sua branch principal for 'master'
  workflow_dispatch:      # Permite rodar manualmente no painel do GitHub

jobs:
  deploy-worker:
    runs-on: ubuntu-24.04 # Otimizado para o seu ambiente preferido
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'api'