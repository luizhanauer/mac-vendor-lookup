name: Deploy Vue Frontend

on:
  push:
    paths:
      - 'frontend/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          publish_branch: gh-pages
          keep_files: true # ESSENCIAL: Impede que a pasta /v1/ da API seja apagada
          commit_message: "feat(frontend): deploy vue app [skip ci]"