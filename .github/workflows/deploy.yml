name: Update Vendor Database
on:
  schedule:
    - cron: '0 0 * * 0' # Toda meia-noite de domingo
  workflow_dispatch:      # Permite rodar manualmente

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download latest manuf file
        run: curl -L https://www.wireshark.org/download/automated/data/manuf -o manuf.txt

      - name: Run Generator
        run: go run cmd/generator/main.go -input manuf.txt

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public