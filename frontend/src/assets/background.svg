        @keyframes circuit-run {
          0% { stroke-dashoffset: 1000; opacity: 0; }
          10% { opacity: 0.8; }
          90% { opacity: 0.8; }
          100% { stroke-dashoffset: 0; opacity: 0; }
        }
        .circuit-path {
          fill: none;
          stroke-width: 2.5;
          stroke-linecap: round;
          stroke-linejoin: round;
          stroke-dasharray: 80 1000;
          animation: circuit-run linear infinite;
        }
        .pcie-pad {
          fill: #289f91;
          opacity: 0.2;
